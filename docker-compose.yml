services:
  app:
    build: .
    ports: ["8088:8088"]
    env_file: .env
    depends_on: [postgres, redis]
    volumes: ["./data:/app/data"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pgdata:
